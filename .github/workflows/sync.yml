name: Gemini Knowledge Sync

on:
  repository_dispatch:
    types: [knowledge_sync]

jobs:
  process-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg  # 视频提取音频必需

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Run Knowledge Extraction
        env:
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
          TARGET_URL: ${{ github.event.client_payload.url }}
          PLATFORM: ${{ github.event.client_payload.platform }}
        # 这里的 main.py 是接下来的核心脚本
        run: python main.py
